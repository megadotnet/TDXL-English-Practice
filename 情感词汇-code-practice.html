    let currentIndex = 0;

    function updateCard() {
        document.getElementById('wordDisplay').innerText = words[currentIndex].word;
        document.getElementById('meaningDisplay').innerText = words[currentIndex].meaning;
        document.getElementById('exampleDisplay').innerText = words[currentIndex].example;
        document.getElementById('meaningBox').style.display = 'none'; // 切换单词时自动隐藏释义
    }

    function toggleMeaning() {
        const box = document.getElementById('meaningBox');
        box.style.display = box.style.display === 'none' ? 'block' : 'none';
    }

    function speakWord() {
        const synth = window.speechSynthesis;
        const utterThis = new SpeechSynthesisUtterance(words[currentIndex].word);
        utterThis.lang = 'en-US'; // 设置为美式英语发音
        utterThis.rate = 0.85; // 稍微放慢一点点语速，方便听清细节
        synth.speak(utterThis);
    }

    function nextWord() {
        currentIndex = (currentIndex + 1) % words.length;
        updateCard();
    }

    function prevWord() {
        currentIndex = (currentIndex - 1 + words.length) % words.length;
        updateCard();
    }

    // 页面加载时初始化第一张卡片
    updateCard();
</script>
</body>
</html>
